<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mellringe Café - Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #F7F5F0;
      color: #333;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      color: #2D211B;
      text-align: center;
      margin-bottom: 40px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input[type="text"], input[type="password"], select, input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
    }
    button {
      background: #C4A47C;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    button:hover {
      background: #A68761;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      font-weight: 600;
      color: #2D211B;
    }
    .action-btn {
      padding: 6px 12px;
      font-size: 13px;
      margin-right: 5px;
    }
    .btn-danger {
      background: #e74c3c;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    .btn-secondary {
      background: #34495e;
      margin-right: 10px;
    }
    .btn-secondary:hover {
      background: #2c3e50;
    }
    .btn-cancel {
      background: #ccc;
      color: #333;
    }
    .btn-cancel:hover {
      background: #bbb;
    }
    .w-100 {
      width: 100%;
    }
    .text-center {
      text-align: center;
    }
    .mt-0 {
      margin-top: 0;
    }
    .mb-4 {
      margin-bottom: 20px;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .flex-between {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
    .table-responsive {
      overflow-x: auto;
    }
    .login-wrapper {
      max-width: 400px;
      margin: 0 auto;
    }
    .hidden {
      display: none;
    }
    #loginSection, #dashboardSection {
      display: none;
    }
    .active-section {
      display: block !important;
    }
    .image-preview {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Mellringe Café Admin</h1>

  <!-- LOGIN SECTION -->
  <div id="loginSection" class="card active-section login-wrapper">
    <h2 class="text-center mt-0">Logga in</h2>
    <div class="form-group">
      <label for="loginUser">Användarnamn</label>
      <input type="text" id="loginUser" placeholder="Användarnamn" title="Användarnamn">
    </div>
    <div class="form-group">
      <label for="loginPass">Lösenord</label>
      <input type="password" id="loginPass" placeholder="Lösenord" title="Lösenord">
    </div>
    <button onclick="login()" class="w-100">Logga In</button>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboardSection">
    <div class="flex-between mb-4">
      <h2 class="mt-0">Hantera Meny</h2>
      <div>
        <button onclick="togglePasswordForm()" class="btn-secondary">Byt Lösenord</button>
        <button onclick="logout()" class="btn-danger">Logga Ut</button>
      </div>
    </div>

    <!-- CHANGE PASSWORD FORM -->
    <div id="passwordSection" class="card hidden">
      <h3 class="mt-0">Byt Lösenord</h3>
      <div class="grid-2">
        <div class="form-group">
          <label for="oldPassword">Gammalt Lösenord</label>
          <input type="password" id="oldPassword" placeholder="Gammalt Lösenord" title="Gammalt Lösenord">
        </div>
        <div class="form-group">
          <label for="newPassword">Nytt Lösenord</label>
          <input type="password" id="newPassword" placeholder="Nytt Lösenord" title="Nytt Lösenord">
        </div>
      </div>
      <button onclick="changePassword()">Uppdatera Lösenord</button>
    </div>

    <!-- ADD ITEM FORM -->
    <div class="card">
      <h3 class="mt-0" id="formTitle">Lägg till ny produkt</h3>
      <form id="itemForm" onsubmit="saveItem(event)">
        <input type="hidden" id="itemId">
        <div class="grid-2">
          <div class="form-group">
            <label for="itemCategory">Kategori</label>
            <input type="text" id="itemCategory" placeholder="T.ex. Manakish" title="Kategori" required>
          </div>
          <div class="form-group">
            <label for="itemIcon">Kategori Ikon (Emoji)</label>
            <input type="text" id="itemIcon" placeholder="T.ex. 🫓" title="Kategori Ikon" required>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label for="itemName">Produktnamn</label>
            <input type="text" id="itemName" placeholder="T.ex. Zaatar" title="Produktnamn" required>
          </div>
          <div class="form-group">
            <label for="itemPrice">Pris (inkl. kr)</label>
            <input type="text" id="itemPrice" placeholder="T.ex. 20 kr" title="Pris" required>
          </div>
        </div>
        <div class="form-group">
          <label for="itemImage">Bild (Valfritt)</label>
          <input type="file" id="itemImage" accept="image/*" title="Bild">
        </div>
        <button type="submit" id="saveBtn">Spara Produkt</button>
        <button type="button" onclick="resetForm()" class="btn-cancel">Avbryt</button>
      </form>
    </div>

    <!-- MENU TABLE -->
    <div class="card table-responsive">
      <table id="menuTable">
        <thead>
          <tr>
            <th>Bild</th>
            <th>Kategori</th>
            <th>Namn</th>
            <th>Pris</th>
            <th>Hantera</th>
          </tr>
        </thead>
        <tbody id="menuList">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
  let token = localStorage.getItem('adminToken');

  if (token) {
    showDashboard();
  }

  async function login() {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('adminToken', data.token);
        token = data.token;
        showDashboard();
      } else {
        alert('Fel användarnamn eller lösenord');
      }
    } catch (e) {
      alert('Kunde inte ansluta till servern');
    }
  }

  function logout() {
    localStorage.removeItem('adminToken');
    token = null;
    document.getElementById('loginSection').classList.add('active-section');
    document.getElementById('dashboardSection').classList.remove('active-section');
  }

  function showDashboard() {
    document.getElementById('loginSection').classList.remove('active-section');
    document.getElementById('dashboardSection').classList.add('active-section');
    loadMenu();
  }

  async function loadMenu() {
    try {
      const res = await fetch('/api/menu');
      const items = await res.json();
      const tbody = document.getElementById('menuList');
      tbody.innerHTML = '';
      
      items.forEach(item => {
        const tr = document.createElement('tr');
        const imgPath = item.image ? item.image : '';
        tr.innerHTML = `
          <td>${imgPath ? `<img src="${imgPath}" class="image-preview">` : '-'}</td>
          <td>${item.categoryIcon} ${item.category}</td>
          <td>${item.name}</td>
          <td>${item.price}</td>
          <td>
            <button class="action-btn" onclick='editItem(${JSON.stringify(item)})'>Ändra</button>
            <button class="action-btn btn-danger" onclick="deleteItem('${item._id}')">Ta bort</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    } catch (e) {
      console.error(e);
    }
  }

  async function saveItem(e) {
    e.preventDefault();
    const id = document.getElementById('itemId').value;
    const formData = new FormData();
    formData.append('category', document.getElementById('itemCategory').value);
    formData.append('categoryIcon', document.getElementById('itemIcon').value);
    formData.append('name', document.getElementById('itemName').value);
    formData.append('price', document.getElementById('itemPrice').value);
    
    const imageFile = document.getElementById('itemImage').files[0];
    if (imageFile) {
      formData.append('image', imageFile);
    }

    const url = id ? `/api/menu/${id}` : '/api/menu';
    const method = id ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, {
        method,
        headers: {
          'Authorization': 'Bearer ' + token
        },
        body: formData
      });
      if (res.ok) {
        resetForm();
        loadMenu();
      } else {
        alert('Ett fel uppstod när produkten skulle sparas');
      }
    } catch (err) {
      console.error(err);
    }
  }

  function editItem(item) {
    document.getElementById('formTitle').innerText = 'Ändra produkt';
    document.getElementById('itemId').value = item._id;
    document.getElementById('itemCategory').value = item.category;
    document.getElementById('itemIcon').value = item.categoryIcon;
    document.getElementById('itemName').value = item.name;
    document.getElementById('itemPrice').value = item.price;
    document.getElementById('saveBtn').innerText = 'Uppdatera';
    window.scrollTo(0,0);
  }

  function resetForm() {
    document.getElementById('itemForm').reset();
    document.getElementById('itemId').value = '';
    document.getElementById('formTitle').innerText = 'Lägg till ny produkt';
    document.getElementById('saveBtn').innerText = 'Spara Produkt';
  }

  async function deleteItem(id) {
    if (!confirm('Är du säker på att du vill ta bort denna produkt?')) return;
    try {
      const res = await fetch(`/api/menu/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });
      if (res.ok) {
        loadMenu();
      }
    } catch (e) {
      console.error(e);
    }
  }

  function togglePasswordForm() {
    const section = document.getElementById('passwordSection');
    section.classList.toggle('hidden');
  }

  async function changePassword() {
    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    if (!oldPassword || !newPassword) return alert('Fyll i båda fälten');

    try {
      const res = await fetch('/api/auth/password', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ oldPassword, newPassword })
      });
      const data = await res.json();
      if (res.ok) {
        alert('Lösenordet har ändrats framgångsrikt!');
        document.getElementById('oldPassword').value = '';
        document.getElementById('newPassword').value = '';
        togglePasswordForm();
      } else {
        alert(data.message || 'Ett fel uppstod');
      }
    } catch (e) {
      alert('Kunde inte ansluta till servern');
    }
  }
</script>
</body>
</html>
