<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mellringe Café - Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #F7F5F0;
      color: #333;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      color: #2D211B;
      text-align: center;
      margin-bottom: 40px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .icon-field-offset {
      margin-top: 28px;
    }
    #itemCategorySelect {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      padding-right: 44px;
      background-image:
        linear-gradient(45deg, transparent 50%, #666 50%),
        linear-gradient(135deg, #666 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 2px),
        calc(100% - 12px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }
    .password-field {
      position: relative;
    }
    .password-field input {
      padding-right: 44px;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: #888;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s, transform 0.2s;
    }
    .toggle-password:hover {
      color: #2D211B;
      transform: translateY(-50%) scale(1.08);
      background: transparent;
    }
    .toggle-password svg {
      display: block;
      width: 20px;
      height: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    small {
      display: block;
      margin-top: -2px;
      margin-bottom: 8px;
      color: #666;
      font-size: 12px;
    }
    input[type="text"], input[type="password"], select, input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
    }
    button {
      background: #C4A47C;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    button:hover {
      background: #A68761;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      font-weight: 600;
      color: #2D211B;
    }
    .action-btn {
      padding: 6px 12px;
      font-size: 13px;
      margin-right: 5px;
    }
    .drag-handle {
      cursor: grab;
      font-size: 20px;
      color: #8a8a8a;
      -webkit-user-select: none;
      user-select: none;
    }
    tr.dragging {
      opacity: 0.5;
    }
    .btn-danger {
      background: #e74c3c;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    .btn-secondary {
      background: #34495e;
      margin-right: 10px;
    }
    .btn-secondary:hover {
      background: #2c3e50;
    }
    .btn-sync {
      background: #2f7d56;
      margin-right: 10px;
    }
    .btn-sync:hover {
      background: #256346;
    }
    .btn-cancel {
      background: #ccc;
      color: #333;
    }
    .btn-cancel:hover {
      background: #bbb;
    }
    .w-100 {
      width: 100%;
    }
    .text-center {
      text-align: center;
    }
    .mt-0 {
      margin-top: 0;
    }
    .mb-4 {
      margin-bottom: 20px;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .icon-field-offset {
        margin-top: 0;
      }

      .flex-between {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
    .table-responsive {
      overflow-x: auto;
    }
    .category-order-box {
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid #ececec;
      border-radius: 10px;
      background: #fafafa;
    }
    .category-order-title {
      margin: 0 0 10px;
      font-size: 14px;
      color: #555;
      font-weight: 700;
    }
    .category-order-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .category-order-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #e3e3e3;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .category-order-item button {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      background: #34495e;
    }
    .login-wrapper {
      max-width: 400px;
      margin: 0 auto;
    }
    .hidden {
      display: none;
    }
    .inline-hidden {
      display: none;
    }
    #loginSection, #dashboardSection {
      display: none;
    }
    .active-section {
      display: block !important;
    }
    .image-preview {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
    }
    .status-message {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .status-success {
      color: #1f7a3d;
    }
    .status-error {
      color: #b42318;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 13, 0.45);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-card {
      width: min(460px, 100%);
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      padding: 20px;
    }
    .modal-title {
      margin: 0 0 8px;
      color: #2D211B;
      font-size: 24px;
    }
    .modal-text {
      margin: 0 0 20px;
      color: #444;
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn-outline {
      background: #fff;
      color: #2D211B;
      border: 1px solid #d6d6d6;
    }
    .btn-outline:hover {
      background: #f6f6f6;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Mellringe Café Admin</h1>

  <!-- LOGIN SECTION -->
  <div id="loginSection" class="card active-section login-wrapper">
    <h2 class="text-center mt-0">Logga in</h2>
    <form id="loginForm" onsubmit="login(event)">
      <div class="form-group">
        <label for="loginUser">Användarnamn</label>
        <input type="text" id="loginUser" placeholder="Användarnamn" title="Användarnamn">
      </div>
      <div class="form-group">
        <label for="loginPass">Lösenord</label>
        <div class="password-field">
          <input type="password" id="loginPass" placeholder="Lösenord" title="Lösenord">
          <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPass', this)" aria-label="Visa eller dölj lösenord">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="w-100">Logga In</button>
    </form>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboardSection">
    <div class="flex-between mb-4">
      <h2 class="mt-0">Hantera Meny</h2>
      <div>
        <button onclick="syncDefaultMenu()" class="btn-sync">Synka Standardmeny</button>
        <button onclick="togglePasswordForm()" class="btn-secondary">Byt Lösenord</button>
        <button onclick="logout()" class="btn-danger">Logga Ut</button>
      </div>
    </div>

    <!-- CHANGE PASSWORD FORM -->
    <div id="passwordSection" class="card hidden">
      <h3 class="mt-0">Byt Lösenord</h3>
      <div class="grid-2">
        <div class="form-group">
          <label for="oldPassword">Gammalt Lösenord</label>
          <div class="password-field">
            <input type="password" id="oldPassword" placeholder="Gammalt Lösenord" title="Gammalt Lösenord">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('oldPassword', this)" aria-label="Visa eller dölj gammalt lösenord">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="newPassword">Nytt Lösenord</label>
          <div class="password-field">
            <input type="password" id="newPassword" placeholder="Nytt Lösenord" title="Nytt Lösenord">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('newPassword', this)" aria-label="Visa eller dölj nytt lösenord">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
      </div>
      <button onclick="changePassword()">Uppdatera Lösenord</button>
      <div id="passwordStatus" class="status-message"></div>
    </div>

    <!-- ADD ITEM FORM -->
    <div class="card">
      <h3 class="mt-0" id="formTitle">Lägg till ny produkt</h3>
      <form id="itemForm" onsubmit="saveItem(event)">
        <input type="hidden" id="itemId">
        <div class="grid-2">
          <div class="form-group">
            <label for="itemCategorySelect">Kategori</label>
            <small>Välj befintlig kategori eller skapa en ny.</small>
            <select id="itemCategorySelect" title="Kategori" onchange="handleCategoryModeChange()" required>
              <option value="">Välj kategori</option>
              <option value="__new__">+ Ny kategori</option>
            </select>
            <input class="inline-hidden" type="text" id="itemCategoryNew" placeholder="Namn på ny kategori" title="Ny kategori">
          </div>
          <div class="form-group icon-field-offset">
            <label for="itemIcon">Kategori Ikon (Emoji)</label>
            <input type="text" id="itemIcon" placeholder="T.ex. 🫓 (valfritt vid befintlig kategori)" title="Kategori Ikon">
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label for="itemCategoryImage">Kategori-bild (URL)</label>
            <input type="text" id="itemCategoryImage" placeholder="T.ex. /uploads/kakor.jpg eller images/cat-pastries.png" title="Kategori bild">
          </div>
          <div class="form-group">
            <label for="itemCategoryPrice">Kategori pristext</label>
            <input type="text" id="itemCategoryPrice" placeholder="T.ex. Från 15 kr" title="Kategori pristext">
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label for="itemName">Produktnamn</label>
            <input type="text" id="itemName" placeholder="T.ex. Zaatar" title="Produktnamn" required>
          </div>
          <div class="form-group">
            <label for="itemPrice">Pris (inkl. kr)</label>
            <input type="text" id="itemPrice" placeholder="T.ex. 20 kr" title="Pris" required>
          </div>
        </div>
        <div class="form-group">
          <label for="itemImage">Bild (Valfritt)</label>
          <input type="file" id="itemImage" accept="image/*" title="Bild">
        </div>
        <button type="submit" id="saveBtn">Spara Produkt</button>
        <button type="button" onclick="resetForm()" class="btn-cancel">Avbryt</button>
      </form>
    </div>

    <!-- MENU TABLE -->
    <div class="card table-responsive">
      <div class="category-order-box">
        <p class="category-order-title">Kategoriordning (hela kategorier)</p>
        <div id="categoryOrderList" class="category-order-list"></div>
      </div>
      <table id="menuTable">
        <thead>
          <tr>
            <th>Flytta</th>
            <th>Steg</th>
            <th>Bild</th>
            <th>Kategori</th>
            <th>Namn</th>
            <th>Pris</th>
            <th>Hantera</th>
          </tr>
        </thead>
        <tbody id="menuList">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

  </div>
</div>

<div id="appModal" class="modal-overlay" aria-hidden="true">
  <div class="modal-card">
    <h4 id="appModalTitle" class="modal-title">Meddelande</h4>
    <p id="appModalText" class="modal-text"></p>
    <div class="modal-actions">
      <button type="button" id="appModalCancel" class="btn-outline">Avbryt</button>
      <button type="button" id="appModalConfirm">OK</button>
    </div>
  </div>
</div>

<script>
  let token = localStorage.getItem('adminToken');
  let menuItemsCache = [];

  function setPasswordStatus(message, type) {
    const el = document.getElementById('passwordStatus');
    if (!el) return;
    el.className = 'status-message ' + (type === 'error' ? 'status-error' : 'status-success');
    el.textContent = message || '';
  }

  function notifyMenuUpdated() {
    try {
      localStorage.setItem('mellringe_menu_last_update', String(Date.now()));
    } catch (e) {
      // Ignore storage errors
    }
  }

  function showModal(options) {
    return new Promise((resolve) => {
      const cfg = options || {};
      const overlay = document.getElementById('appModal');
      const title = document.getElementById('appModalTitle');
      const text = document.getElementById('appModalText');
      const cancelBtn = document.getElementById('appModalCancel');
      const confirmBtn = document.getElementById('appModalConfirm');

      title.textContent = cfg.title || 'Meddelande';
      text.textContent = cfg.message || '';
      confirmBtn.textContent = cfg.confirmText || 'OK';
      cancelBtn.textContent = cfg.cancelText || 'Avbryt';
      cancelBtn.style.display = cfg.showCancel ? 'inline-flex' : 'none';

      const close = (result) => {
        overlay.classList.remove('active');
        confirmBtn.onclick = null;
        cancelBtn.onclick = null;
        overlay.onclick = null;
        resolve(result);
      };

      confirmBtn.onclick = () => close(true);
      cancelBtn.onclick = () => close(false);
      overlay.onclick = (e) => {
        if (e.target === overlay && cfg.showCancel) close(false);
      };

      overlay.classList.add('active');
    });
  }

  async function showAlertModal(message, title) {
    await showModal({ title: title || 'Meddelande', message, confirmText: 'OK', showCancel: false });
  }

  async function showConfirmModal(message, title) {
    return showModal({ title: title || 'Bekräfta', message, confirmText: 'Ja', cancelText: 'Nej', showCancel: true });
  }

  function togglePasswordVisibility(inputId, button) {
    const input = document.getElementById(inputId);
    if (!input) return;
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    if (button) {
      if (isPassword) {
        // Show Eye-Slash SVG (to hide password)
        button.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
      } else {
        // Show Eye SVG (to show password)
        button.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
      }
    }
  }

  function getUniqueCategories(items) {
    const seen = new Set();
    const result = [];
    (Array.isArray(items) ? items : []).forEach(item => {
      const raw = String(item.category || '').trim();
      const key = raw.toLowerCase();
      if (!raw || seen.has(key)) return;
      seen.add(key);
      result.push(raw);
    });
    return result;
  }

  function refreshCategoryOptions(selectedValue) {
    const select = document.getElementById('itemCategorySelect');
    if (!select) return;

    const categories = getUniqueCategories(menuItemsCache);
    const current = selectedValue || select.value;

    select.innerHTML = '<option value="">Välj kategori</option>';
    categories.forEach(category => {
      const option = document.createElement('option');
      option.value = category;
      option.textContent = category;
      select.appendChild(option);
    });

    const createNew = document.createElement('option');
    createNew.value = '__new__';
    createNew.textContent = '+ Ny kategori';
    select.appendChild(createNew);

    if (current) {
      if (categories.some(c => c.toLowerCase() === current.toLowerCase())) {
        select.value = categories.find(c => c.toLowerCase() === current.toLowerCase());
      } else {
        select.value = '__new__';
        const newInput = document.getElementById('itemCategoryNew');
        if (newInput) newInput.value = current;
      }
    }

    handleCategoryModeChange();
  }

  function handleCategoryModeChange() {
    const select = document.getElementById('itemCategorySelect');
    const newInput = document.getElementById('itemCategoryNew');
    if (!select || !newInput) return;

    const isNew = select.value === '__new__';
    newInput.classList.toggle('inline-hidden', !isNew);
    newInput.required = isNew;
    if (!isNew) {
      newInput.value = '';
      fillCategoryDefaults(select.value);
    } else {
      document.getElementById('itemCategoryImage').value = '';
      document.getElementById('itemCategoryPrice').value = '';
    }
  }

  function fillCategoryDefaults(categoryName) {
    const match = menuItemsCache.find(item => String(item.category || '').trim().toLowerCase() === String(categoryName || '').trim().toLowerCase());
    if (!match) return;

    if (!document.getElementById('itemIcon').value) {
      document.getElementById('itemIcon').value = match.categoryIcon || '';
    }
    document.getElementById('itemCategoryImage').value = match.categoryImage || '';
    document.getElementById('itemCategoryPrice').value = match.categoryPrice || '';
  }

  if (token) {
    showDashboard();
  }

  async function login(event) {
    if (event) event.preventDefault();
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('adminToken', data.token);
        token = data.token;
        showDashboard();
      } else {
        await showAlertModal('Fel användarnamn eller lösenord. Kontrollera uppgifterna och försök igen.', 'Inloggning misslyckades');
      }
    } catch (e) {
      await showAlertModal('Kunde inte ansluta till servern. Kontrollera att servern är igång och försök igen.', 'Anslutningsfel');
    }
  }

  function logout() {
    localStorage.removeItem('adminToken');
    token = null;
    document.getElementById('loginSection').classList.add('active-section');
    document.getElementById('dashboardSection').classList.remove('active-section');
  }

  async function syncDefaultMenu() {
    const shouldSync = await showConfirmModal('Detta lagger till saknade standardartiklar utan att radera dina egna. Vill du fortsatta?', 'Synka standardmeny');
    if (!shouldSync) return;

    try {
      const res = await fetch('/api/menu/sync-defaults', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        await showAlertModal(data.message || data.error || 'Kunde inte synka standardmenyn.', 'Synk misslyckades');
        return;
      }

      await loadMenu();
      await showAlertModal(data.message || 'Synk klar.', 'Klar');
    } catch (err) {
      await showAlertModal('Kunde inte ansluta till servern.', 'Anslutningsfel');
    }
  }

  function showDashboard() {
    document.getElementById('loginSection').classList.remove('active-section');
    document.getElementById('dashboardSection').classList.add('active-section');
    loadMenu();
  }

  async function loadMenu() {
    try {
      const res = await fetch('/api/menu', { cache: 'no-store' });
      const items = await res.json();
      menuItemsCache = Array.isArray(items) ? items : [];
      refreshCategoryOptions();
      renderCategoryOrderControls();
      const tbody = document.getElementById('menuList');
      tbody.innerHTML = '';
      
      menuItemsCache.forEach(item => {
        const tr = document.createElement('tr');
        tr.draggable = true;
        tr.dataset.id = item._id;
        tr.dataset.category = item.category;
        const imgPath = item.image ? item.image : '';
        tr.innerHTML = `
          <td><span class="drag-handle" title="Dra för att ändra ordning">⋮⋮</span></td>
          <td>
            <button type="button" class="action-btn btn-secondary" onclick="moveItemByOffset('${item._id}', '${item.category.replace(/'/g, "\\'")}', -1)">↑</button>
            <button type="button" class="action-btn btn-secondary" onclick="moveItemByOffset('${item._id}', '${item.category.replace(/'/g, "\\'")}', 1)">↓</button>
          </td>
          <td>${imgPath ? `<img src="${imgPath}" class="image-preview">` : '-'}</td>
          <td>${item.categoryIcon} ${item.category}</td>
          <td>${item.name}</td>
          <td>${item.price}</td>
          <td>
            <button class="action-btn" onclick='editItem(${JSON.stringify(item)})'>Ändra</button>
            <button class="action-btn btn-danger" onclick="deleteItem('${item._id}')">Ta bort</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      initRowReorder();
    } catch (e) {
      console.error(e);
    }
  }

  function getOrderedCategoriesFromCache() {
    const seen = new Set();
    const ordered = [];
    menuItemsCache.forEach((item) => {
      const category = String(item.category || '').trim();
      const key = category.toLowerCase();
      if (!category || seen.has(key)) return;
      seen.add(key);
      ordered.push(category);
    });
    return ordered;
  }

  function renderCategoryOrderControls() {
    const container = document.getElementById('categoryOrderList');
    if (!container) return;

    const categories = getOrderedCategoriesFromCache();
    container.innerHTML = '';

    categories.forEach((category, index) => {
      const item = document.createElement('div');
      item.className = 'category-order-item';
      const isFirst = index === 0;
      const isLast = index === categories.length - 1;
      item.innerHTML = `
        <span>${category}</span>
        <button type="button" ${isFirst ? 'disabled' : ''} onclick="moveCategoryByOffset('${category.replace(/'/g, "\\'")}', -1)">↑</button>
        <button type="button" ${isLast ? 'disabled' : ''} onclick="moveCategoryByOffset('${category.replace(/'/g, "\\'")}', 1)">↓</button>
      `;
      container.appendChild(item);
    });
  }

  async function moveCategoryByOffset(category, offset) {
    const categories = getOrderedCategoriesFromCache();
    const currentIndex = categories.findIndex((c) => c === category);
    if (currentIndex < 0) return;

    const nextIndex = currentIndex + offset;
    if (nextIndex < 0 || nextIndex >= categories.length) return;

    const nextCategories = [...categories];
    const [moved] = nextCategories.splice(currentIndex, 1);
    nextCategories.splice(nextIndex, 0, moved);

    try {
      const res = await fetch('/api/menu/reorder-categories', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ categories: nextCategories })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        await showAlertModal(data.message || data.error || 'Kunde inte uppdatera kategoriordningen.', 'Fel vid kategorisortering');
        return;
      }

      await loadMenu();
      notifyMenuUpdated();
      await showAlertModal('Kategoriordningen uppdaterades.', 'Klar');
    } catch (err) {
      await showAlertModal('Kunde inte ansluta till servern.', 'Anslutningsfel');
    }
  }

  function initRowReorder() {
    const tbody = document.getElementById('menuList');
    if (!tbody) return;

    let draggingRow = null;

    tbody.querySelectorAll('tr').forEach((row) => {
      row.addEventListener('dragstart', () => {
        draggingRow = row;
        row.classList.add('dragging');
      });

      row.addEventListener('dragend', async () => {
        row.classList.remove('dragging');
        if (!draggingRow) return;
        const category = draggingRow.dataset.category;
        draggingRow = null;
        await saveCategoryOrder(category);
      });

      row.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!draggingRow || draggingRow === row) return;
        if (draggingRow.dataset.category !== row.dataset.category) return;

        const rect = row.getBoundingClientRect();
        const isAfter = e.clientY > rect.top + rect.height / 2;
        if (isAfter) {
          row.after(draggingRow);
        } else {
          row.before(draggingRow);
        }
      });
    });
  }

  async function saveCategoryOrder(category) {
    const rows = Array.from(document.querySelectorAll('#menuList tr'))
      .filter((row) => row.dataset.category === category);

    if (rows.length === 0) return;

    const itemIds = rows.map((row) => row.dataset.id).filter(Boolean);
    if (itemIds.length === 0) return;

    try {
      const payload = JSON.stringify({ category, itemIds });
      const requestOptions = {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: payload
      };

      let res = await fetch('/api/menu/reorder-category', requestOptions);
      if (res.status === 404) {
        res = await fetch('/api/menu/reorder', requestOptions);
      }

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const fallbackMessage = res.status === 404
          ? 'Sortering-route saknas i servern. Starta om servern och testa igen.'
          : `Kunde inte uppdatera ordningen. (HTTP ${res.status})`;
        await showAlertModal(data.message || data.error || fallbackMessage, 'Fel vid sortering');
        await loadMenu();
        return;
      }

      notifyMenuUpdated();
      await showAlertModal('Ordningen uppdaterades.', 'Klar');
    } catch (err) {
      await showAlertModal('Kunde inte ansluta till servern.', 'Anslutningsfel');
      await loadMenu();
    }
  }

  async function moveItemByOffset(itemId, category, offset) {
    const rows = Array.from(document.querySelectorAll('#menuList tr'))
      .filter((row) => row.dataset.category === category);

    const currentIndex = rows.findIndex((row) => row.dataset.id === itemId);
    if (currentIndex < 0) return;

    const nextIndex = currentIndex + offset;
    if (nextIndex < 0 || nextIndex >= rows.length) return;

    const target = rows[nextIndex];
    const current = rows[currentIndex];
    if (offset < 0) {
      target.before(current);
    } else {
      target.after(current);
    }

    await saveCategoryOrder(category);
  }

  async function saveItem(e) {
    e.preventDefault();
    const id = document.getElementById('itemId').value;
    const categorySelect = document.getElementById('itemCategorySelect').value;
    const categoryNew = document.getElementById('itemCategoryNew').value;
    const categoryValue = (categorySelect === '__new__' ? categoryNew : categorySelect).trim();
    const iconValue = document.getElementById('itemIcon').value;
    const categoryImageValue = document.getElementById('itemCategoryImage').value.trim();
    const categoryPriceValue = document.getElementById('itemCategoryPrice').value.trim();

    if (!categoryValue) {
      await showAlertModal('Välj kategori eller skriv ny kategori.', 'Kategori saknas');
      return;
    }

    const normalizedCategory = String(categoryValue || '').trim().toLowerCase();
    const matchedCategory = menuItemsCache.find(item => String(item.category || '').trim().toLowerCase() === normalizedCategory);

    const formData = new FormData();
    formData.append('category', categoryValue);
    formData.append('categoryIcon', iconValue || (matchedCategory?.categoryIcon || ''));
    formData.append('categoryImage', categoryImageValue || (matchedCategory?.categoryImage || ''));
    formData.append('categoryPrice', categoryPriceValue || (matchedCategory?.categoryPrice || `Från ${document.getElementById('itemPrice').value}`));
    formData.append('name', document.getElementById('itemName').value);
    formData.append('price', document.getElementById('itemPrice').value);
    
    const imageFile = document.getElementById('itemImage').files[0];
    if (imageFile) {
      formData.append('image', imageFile);
    }

    const url = id ? `/api/menu/${id}` : '/api/menu';
    const method = id ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, {
        method,
        headers: {
          'Authorization': 'Bearer ' + token
        },
        body: formData
      });
      if (res.ok) {
        const successMessage = id
          ? 'Produkten uppdaterades framgangsrikt.'
          : 'Produkten lades till framgangsrikt.';
        resetForm();
        await loadMenu();
        notifyMenuUpdated();
        await showAlertModal(successMessage, 'Klar');
      } else {
        const data = await res.json().catch(() => ({}));
        await showAlertModal(data.message || data.error || 'Ett fel uppstod när produkten skulle sparas', 'Kunde inte spara');
      }
    } catch (err) {
      console.error(err);
    }
  }

  function editItem(item) {
    document.getElementById('formTitle').innerText = 'Ändra produkt';
    document.getElementById('itemId').value = item._id;
    refreshCategoryOptions(item.category);
    document.getElementById('itemIcon').value = item.categoryIcon;
    document.getElementById('itemCategoryImage').value = item.categoryImage || '';
    document.getElementById('itemCategoryPrice').value = item.categoryPrice || '';
    document.getElementById('itemName').value = item.name;
    document.getElementById('itemPrice').value = item.price;
    document.getElementById('saveBtn').innerText = 'Uppdatera';
    window.scrollTo(0,0);
  }

  function resetForm() {
    document.getElementById('itemForm').reset();
    document.getElementById('itemId').value = '';
    document.getElementById('formTitle').innerText = 'Lägg till ny produkt';
    document.getElementById('saveBtn').innerText = 'Spara Produkt';
    refreshCategoryOptions();
  }

  async function deleteItem(id) {
    const shouldDelete = await showConfirmModal('Är du säker på att du vill ta bort denna produkt?', 'Ta bort produkt');
    if (!shouldDelete) return;
    try {
      const res = await fetch(`/api/menu/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });
      if (res.ok) {
        await loadMenu();
        notifyMenuUpdated();
        await showAlertModal('Produkten togs bort framgangsrikt.', 'Borttagen');
      } else {
        const data = await res.json().catch(() => ({}));
        await showAlertModal(data.message || data.error || 'Kunde inte ta bort produkten.', 'Fel vid borttagning');
      }
    } catch (e) {
      await showAlertModal('Kunde inte ansluta till servern.', 'Anslutningsfel');
    }
  }

  function togglePasswordForm() {
    const section = document.getElementById('passwordSection');
    section.classList.toggle('hidden');
    if (section.classList.contains('hidden')) {
      setPasswordStatus('', 'success');
    }
  }

  async function changePassword() {
    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    if (!oldPassword || !newPassword) {
      setPasswordStatus('Fyll i både gammalt och nytt lösenord.', 'error');
      return;
    }

    try {
      const res = await fetch('/api/auth/password', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ oldPassword, newPassword })
      });
      const data = await res.json();
      if (res.ok) {
        setPasswordStatus('Losenordet har uppdaterats.', 'success');
        document.getElementById('oldPassword').value = '';
        document.getElementById('newPassword').value = '';
      } else {
        setPasswordStatus(data.message || 'Kunde inte uppdatera losenordet.', 'error');
      }
    } catch (e) {
      setPasswordStatus('Kunde inte ansluta till servern.', 'error');
    }
  }
</script>
